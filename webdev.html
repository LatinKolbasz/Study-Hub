                <div style="display: flex; gap: 1rem; align-items: center;">

        <div class="sector-page-content">

<script src="utils/auth.js"></script>

    <script src="sector-page.js"></script>
    <script>
        const webdevTopics = [
            { id: 1, name: "HTML Alapok", desc: "Tag-ek, struktúra, sémantikus HTML" },
            { id: 2, name: "HTML Elemzés", desc: "Form-ok, táblázatok, Média elemek" },
            { id: 3, name: "CSS Alapok", desc: "Szelektorok, box model, display" },
            { id: 4, name: "CSS Styling", desc: "Színek, betűtípusok, flexbox, grid" },
            { id: 10, name: "Reszponzív", desc: "Mobile-first, media queries" }
        ];

        function renderTopics() {
            const grid = document.getElementById('topicsGrid');
            grid.innerHTML = webdevTopics.map(t => `<div class="topic-card" onclick="alert('📖 ${t.name}: ${t.desc}\n\nHamarosan!')"><h3>${t.name}</h3><p>${t.desc}</p></div>`).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.authManager.checkAuthAndRedirect('login.html');

            window.authManager.whenAuthReady(() => {
                if (!window.authManager.isLoggedIn()) return;
                renderTopics();
                window.sectorPage = new SectorPageManager('webdev');
            });
        });
    </script>
